<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REDX — Agence Digitale Propulsée par l'IA</title>
  <meta name="description"
    content="REDX est une agence digitale propulsée par l'IA — stratégie, automatisation, contenu et technologie, tout sous un même toit." />

  <!-- Canonical & hreflang (dynamic, set by JS) -->
  <link rel="canonical" href="https://redx.ca/" />
  <link rel="alternate" hreflang="fr" href="https://redx.ca/" />
  <link rel="alternate" hreflang="en" href="https://redx.ca/en/" />
  <link rel="alternate" hreflang="x-default" href="https://redx.ca/" />

  <!-- Open Graph -->
  <meta property="og:title" content="REDX — Agence IA & Marketing Digital" />
  <meta property="og:description"
    content="Agence propulsée par l'IA spécialisée en automatisation, publicité Meta, création de contenu et développement d'applications." />
  <meta property="og:image" content="/og-image-redx.jpg" />
  <meta property="og:url" content="https://redx.ca" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="fr_CA" />
  <meta property="og:locale:alternate" content="en_CA" />

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="REDX — Agence IA & Marketing Digital" />
  <meta name="twitter:description"
    content="Agence propulsée par l'IA — automatisation, marketing, développement web et mobile." />
  <meta name="twitter:image" content="/og-image-redx.jpg" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Fonts: preconnect + preload critical font weights -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
